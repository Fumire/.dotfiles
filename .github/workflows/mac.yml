name: macOS CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: check Brewfiles
        run: |
          ruby -c mac/Brewfile
          ruby -c mac/Brewfile.free
          ruby -c mac/Brewfile.Mac
          brew bundle list --all --file mac/Brewfile > /dev/null
          brew bundle list --all --file mac/Brewfile.free > /dev/null
          brew bundle list --all --file mac/Brewfile.Mac > /dev/null

      - name: check macOS Makefile
        run: make -C mac -n free

      - name: check ZSH
        run: |
          zsh -n zsh/zlogout zsh/zshenv zsh/zshrc zsh/alias.zsh
          make zsh_run

      - name: check oh-my-zsh
        run: make -C oh-my-zsh -n

      - name: check VIM
        run: make vim_run
